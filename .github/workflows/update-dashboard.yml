name: Auto Update Liquidity Dashboard

on:
  # 每天 9:30 AM UTC+8 (1:30 AM UTC) 執行
  schedule:
    - cron: '30 1 * * *'  # 每天 9:30 AM 台灣時間

  # 允許手動觸發
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    name: Update Monitoring Data

    steps:
      # 1. 檢出倉庫 (tradingview-dashboard)
      - name: Checkout Dashboard Repo
        uses: actions/checkout@v4
        with:
          path: dashboard


      # 3. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 4. 安裝依賴
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas requests yfinance

      # 5. 執行流動性監測
      - name: Run Liquidity Monitor
        working-directory: dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python liquidity_monitor.py

      # 6. 執行儀表板更新
      - name: Update Dashboard
        working-directory: dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update_dashboard.py

      # 7. 提交並推送變更
      - name: Commit and Push
        working-directory: dashboard
        env:
          GIT_AUTHOR_NAME: 'GitHub Action'
          GIT_AUTHOR_EMAIL: 'action@github.com'
          GIT_COMMITTER_NAME: 'GitHub Action'
          GIT_COMMITTER_EMAIL: 'action@github.com'
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"

          if [ -f dashboard_state.json ] || [ -f liquidity_monitor.csv ]; then
            git add -A
            git commit -m "chore: Auto-update liquidity monitoring data" || echo "No changes"
            git push origin main
          fi

      # 8. 建立狀態報告
      - name: Create Status Report
        if: always()
        run: |
          echo "## Dashboard Update Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Updated" >> $GITHUB_STEP_SUMMARY
          echo "- dashboard_state.json" >> $GITHUB_STEP_SUMMARY
          echo "- liquidity_monitor.csv" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Dashboard Link" >> $GITHUB_STEP_SUMMARY
          echo "https://t0mst0ne.github.io/TV/liquidity_dashboard_enhanced.html" >> $GITHUB_STEP_SUMMARY
