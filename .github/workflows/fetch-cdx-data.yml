name: Fetch CDX Data

on:
  schedule:
    # Run every 4 hours (Cbonds updates end-of-day, so 4h is plenty)
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch CDX data from Cbonds
        env:
          CBONDS_LOGIN:    ${{ secrets.CBONDS_LOGIN }}
          CBONDS_PASSWORD: ${{ secrets.CBONDS_PASSWORD }}
        run: python scripts/fetch_cdx.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cdx_hy.json data/cdx_ig.json
          git diff --staged --quiet \
            || git commit -m "chore: update CDX data [skip ci]"
          git push origin HEAD
